name: CI

on:
  push:
    branches: [master]
    paths: [grammar.js, src/**, test/**, bindings/**, binding.gyp, queries/**]
  pull_request:
    paths: [grammar.js, src/**, test/**, bindings/**, binding.gyp, queries/**]

jobs:
  test:
    name: Test parser
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v5
      - uses: tree-sitter/setup-action/cli@v2
      - uses: tree-sitter/parser-test-action@v3
        with:
          test-rust: true
      - uses: tree-sitter/parse-action@v4
        with:
          files: examples/**/*.kbd
